<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0A0A0A" />
<title>Execution OS</title>
<link rel="manifest" href="manifest.json" />
<link rel="icon" href="icons/icon-192.png" />
<link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div class="app-shell">

    <header class="topbar">
      <div class="brand">
        <span class="brand-mark">⬡</span>
        <span class="brand-name">EXECUTION<strong>OS</strong></span>
      </div>
      <div class="drift-pill" id="driftPill">no heading set</div>
    </header>

    <main id="view" class="view" role="main"></main>

    <nav class="tabbar" id="tabbar" aria-label="Primary">
      <button class="tab active" data-route="dashboard">
        <span class="tab-icon">◈</span><span>Dashboard</span>
      </button>
      <button class="tab" data-route="vision">
        <span class="tab-icon">⌖</span><span>Vision</span>
      </button>
      <button class="tab" data-route="goals">
        <span class="tab-icon">◎</span><span>Goals</span>
      </button>
      <button class="tab" data-route="daily">
        <span class="tab-icon">▤</span><span>Daily</span>
      </button>
      <button class="tab" data-route="more">
        <span class="tab-icon">⋯</span><span>More</span>
      </button>
    </nav>

  </div>

  <template id="tpl-locked">
    <div class="module-locked">
      <div class="locked-glyph">◌</div>
      <h2></h2>
      <p>This module builds on the same foundation and ships next, module by module.</p>
    </div>
  </template>

  <script src="js/storage.js"></script>
  <script src="js/vision.js"></script>
  <script src="js/goals.js"></script>
  <script src="js/daily.js"></script>
  <script src="js/more.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(()=>{}));
    }
  </script>
</body>
</html>
